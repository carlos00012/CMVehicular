{% extends 'plantillaPrincipal.html' %}
{% block contenido %}
<div class="container">
    <div class="row">
        <div class="col-md-3"></div>
        <div class="col-md-6">
            <br><br><br>
            <h1><b>Editar Vehículo: {{ vehiculo.placa }}</b></h1>
            <hr>
            <form enctype="multipart/form-data" id="form_editar_vehiculo" action="/procesarActualizacionVehiculo/" method="post">
                {% csrf_token %}
                
                <input type="hidden" name="id" value="{{ vehiculo.id }}">

                <div class="mb-3">
                    <label for="foto" class="form-label"><b>Foto real del vehículo:</b></label>
                    <input  type="file" name="foto" id="foto" class="form-control" accept="image/*">
                    <small class="text-muted">Dejar en blanco si no desea cambiar la foto actual.</small>
                </div>

                <div class="mb-3">
                    <label for="placa" class="form-label"><b>Placa:</b></label>
                    <input value="{{ vehiculo.placa }}" placeholder="Ingrese la placa del vehículo" type="text" class="form-control" name="placa" required>
                </div>

                <div class="mb-3">
                    <label for="tipo_vehiculo" class="form-label"><b>Tipo de Vehículo:</b></label>
                    <select class="form-select" name="tipo_vehiculo" required>
                        <option value="Sedán" {% if vehiculo.tipo_vehiculo == "Sedan" %}selected{% endif %}>Sedán</option>
                        <option value="Camioneta" {% if vehiculo.tipo_vehiculo == "Camioneta" %}selected{% endif %}>Camioneta</option>
                        <option value="Camión" {% if vehiculo.tipo_vehiculo == "Camion" %}selected{% endif %}>Camión</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block"><b>Tipo de Combustible:</b></label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="tipo_combustible" id="gasolina" value="Gasolina" {% if vehiculo.tipo_combustible == "Gasolina" %}checked{% endif %} required>
                        <label class="form-check-label" for="gasolina">Gasolina</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="tipo_combustible" id="diesel" value="Diésel" {% if vehiculo.tipo_combustible == "Diésel" %}checked{% endif %}>
                        <label class="form-check-label" for="diesel">Diésel</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="tipo_combustible" id="electrico" value="Eléctrico" {% if vehiculo.tipo_combustible == "Eléctrico" %}checked{% endif %}>
                        <label class="form-check-label" for="electrico">Eléctrico</label>
                    </div>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" name="seguro_vigente" id="seguro_vigente" {% if vehiculo.seguro_vigente %}checked{% endif %}>
                    <label class="form-check-label" for="seguro_vigente"><b>¿Tiene seguro vigente?</b></label>
                </div>

                <div class="mb-4">
                    <label class="form-label"><b>Año del Modelo:</b></label>
                    <input value="{{ vehiculo.anio_modelo }}" placeholder="Ej: 2026" type="number" class="form-control" name="anio_modelo" required>
                </div>

                <button class="btn btn-success" type="submit"> <i class="icon-save"></i> Guardar Cambios</button>
                o <a href="/listadoVehiculos/" class="btn btn-danger"> Cancelar</a>
            </form>
        </div>
    </div>
</div>
<script>
$("#form_editar_vehiculo").validate({
    rules: {
        foto: {
            extension: "jpg|jpeg|png"
        },
        placa: {
            required: true,
            minlength: 6,
            maxlength: 10
        },
        tipo_vehiculo: {
            required: true
        },
        tipo_combustible: {
            required: true
        },
        anio_modelo: {
            required: true,
            number: true,
            min: 1900,
            max: 2100
        }
    },
    messages: {
        foto: {
            extension: "Solo se permiten imágenes (jpg, jpeg, png)"
        },
        placa: {
            required: "Ingrese la placa del vehículo",
            minlength: "La placa debe tener al menos 6 caracteres",
            maxlength: "La placa no debe superar 10 caracteres"
        },
        tipo_vehiculo: {
            required: "Seleccione el tipo de vehículo"
        },
        tipo_combustible: {
            required: "Seleccione el tipo de combustible"
        },
        anio_modelo: {
            required: "Ingrese el año del modelo",
            number: "Debe ser un número válido",
            min: "El año no puede ser menor a 1900",
            max: "El año no puede ser mayor a 2100"
        }
    },
    errorClass: "text-danger",
    errorElement: "small"
});
</script>
    <script>
        $('#foto').fileinput({
            language: 'es',
            allowedFileExtensions: ['jpg', 'jpeg', 'png'],
            showCaption: false,
            DropZoneEnabled: true,
            ShowClose: false,

            initialPreview: [
                "{{ vehiculo.foto.url }}"
            ],
            initialPreviewAsData: true, 
            initialPreviewFileType: 'image'
        });
        $(".fileinput-upload").hide();
        //con jquery ocultamos el boton de eliminar que no hacia nada dentro de la imagen
        $(".kv-file-remove").hide();
    </script>
{% endblock %}
