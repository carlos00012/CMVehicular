{% extends 'plantillaPrincipal.html' %}
{% load static %}
{% block contenido %}
<main class="main">
  <section id="hero" class="hero section dark-background">
    <img src="{% static 'assets/img/hero-bg.jpg' %}" class="hero-bg" alt="" data-aos="fade-in">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <br>
                    <br>
                    <h1 class="mb-4"><b>Registrar Mantenimiento</b></h1>
                    <hr>
                    <form enctype="multipart/form-data" id="form_mantenimiento" action="/guardarMantenimiento/" method="post" class="needs-validation">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label"><b>Seleccionar Vehículo:</b></label>
                            <select class="form-select" name="vehiculo" required>
                                <option value="" selected disabled>Elija un vehículo...</option>
                                {% for v in vehiculos %}
                                    <option value="{{ v.id }}">{{ v.placa }} - {{ v.tipo_vehiculo }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><b>Hoja de Diagnóstico / Factura (PDF):</b></label>
                            <input type="file" name="pdf" class="form-control" accept="application/pdf" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><b>Fecha del Servicio:</b></label>
                            <input type="date" class="form-control" name="fecha_servicio" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><b>Costo del Taller ($):</b></label>
                            <input type="number" step="0.01" class="form-control" name="costo_taller" placeholder="0.00" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block"><b>Tipo de Mantenimiento:</b></label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="tipo_mantenimiento" id="preventivo" value="Preventivo" checked required>
                                <label class="form-check-label" for="preventivo">Preventivo</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="tipo_mantenimiento" id="correctivo" value="Correctivo">
                                <label class="form-check-label" for="correctivo">Correctivo</label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label"><b>Repuestos Cambiados:</b></label>
                            <textarea class="form-control" name="repuestos_cambiados" rows="3" placeholder="Detalle las piezas sustituidas..." required></textarea>
                        </div>

                        <button class="btn btn-success" type="submit">Guardar Registro</button>
                        <a href="/listadoMantenimientos/" class="btn btn-danger ms-2">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
        <script>
        $("#form_mantenimiento").validate({
            rules: {
                vehiculo: {
                    required: true
                },
                pdf: {
                    required: true,
                    extension: "pdf"
                },
                fecha_servicio: {
                    required: true,
                    date: true
                },
                costo_taller: {
                    required: true,
                    number: true,
                    min: 0
                },
                tipo_mantenimiento: {
                    required: true
                },
                repuestos_cambiados: {
                    required: true,
                    minlength: 5
                }
            },
            messages: {
                vehiculo: {
                    required: "Seleccione un vehículo"
                },
                pdf: {
                    required: "Debe subir la factura o diagnóstico en PDF",
                    extension: "Solo se permiten archivos PDF"
                },
                fecha_servicio: {
                    required: "Ingrese la fecha del servicio",
                    date: "Ingrese una fecha válida"
                },
                costo_taller: {
                    required: "Ingrese el costo del taller",
                    number: "Debe ser un número válido",
                    min: "El costo no puede ser negativo"
                },
                tipo_mantenimiento: {
                    required: "Seleccione el tipo de mantenimiento"
                },
                repuestos_cambiados: {
                    required: "Describa los repuestos cambiados",
                    minlength: "Debe ingresar al menos 5 caracteres"
                }
            },
            errorClass: "text-danger",
            errorElement: "small"
        });
        </script>
    </section>
</main>        
{% endblock %}
