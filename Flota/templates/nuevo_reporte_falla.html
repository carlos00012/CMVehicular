{% extends 'plantillaPrincipal.html' %}
{% load static %}

{% block contenido %}
<main class="main">
  <section id="hero" class="hero section dark-background">
    <img src="{% static 'assets/img/hero-bg.jpg' %}" class="hero-bg" alt="" data-aos="fade-in">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2><b>Reportar Falla</b></h2>
            <hr>
            
            <form method="post" id="form_falla" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label"><b>Vehículo:</b></label>
                    <select name="vehiculo" class="form-control" required>
                        <option value="">Seleccione un vehículo...</option>
                        {% for v in vehiculos %}
                            <option value="{{ v.id }}">{{ v.placa }} - {{ v.tipo_vehiculo }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label"><b>Título:</b></label>
                    <input type="text" name="titulo" class="form-control" placeholder="Ej: Ruido en el motor" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label"><b>Descripción:</b></label>
                    <textarea name="descripcion" class="form-control" rows="4" required></textarea>
                </div>
                
                <div class="mb-3">
                    <label class="form-label"><b>Gravedad:</b></label>
                    <select name="gravedad" class="form-control">
                        <option value="leve">Leve</option>
                        <option value="moderada">Moderada</option>
                        <option value="grave">Grave</option>
                        <option value="critica">Crítica</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label"><b>Foto (opcional):</b></label>
                    <input type="file" name="foto" class="form-control" accept="image/*">
                </div>
                
                <div class="mb-3">
                    <label class="form-label"><b>Archivo Adjunto (opcional):</b></label>
                    <input type="file" name="archivo_adjunto" class="form-control">
                </div>
                
                <button type="submit" class="btn btn-success">Guardar Reporte</button>
                <a href="{% url 'dashboard_chofer' %}" class="btn btn-danger">Cancelar</a>
            </form>
        </div>
    </div>
</div>
<script>
$("#form_falla").validate({
    rules: {
        vehiculo: {
            required: true
        },
        titulo: {
            required: true,
            minlength: 5,
            maxlength: 100
        },
        descripcion: {
            required: true,
            minlength: 10
        },
        gravedad: {
            required: true
        },
        foto: {
            extension: "jpg|jpeg|png"
        },
        archivo_adjunto: {
            extension: "pdf|doc|docx|jpg|jpeg|png"
        }
    },
    messages: {
        vehiculo: {
            required: "Seleccione un vehículo"
        },
        titulo: {
            required: "Ingrese un título",
            minlength: "El título debe tener al menos 5 caracteres",
            maxlength: "El título no puede superar 100 caracteres"
        },
        descripcion: {
            required: "Ingrese una descripción",
            minlength: "La descripción debe tener al menos 10 caracteres"
        },
        gravedad: {
            required: "Seleccione la gravedad"
        },
        foto: {
            extension: "Solo se permiten imágenes (jpg, jpeg, png)"
        },
        archivo_adjunto: {
            extension: "Formatos permitidos: pdf, doc, docx, imágenes"
        }
    },
    errorClass: "text-danger",
    errorElement: "small",

    submitHandler: function(form) {
        form.submit();
    }
});
</script>
    </section>
</main> 
{% endblock %}
